<script>
    // ==========================================
    // 1. GLOBAL UI FUNCTIONS (Loads Immediately)
    // ==========================================
    window.toggleMenu = function() {
        const sidebar = document.getElementById('sidebar'); 
        const backdrop = document.getElementById('sidebarBackdrop');
        
        if (sidebar) {
            sidebar.classList.toggle('sidebar-open');
            
            if (backdrop) {
                if (sidebar.classList.contains('sidebar-open')) { 
                    backdrop.classList.remove('hidden'); 
                    setTimeout(() => { backdrop.classList.remove('opacity-0'); }, 10); 
                } else { 
                    backdrop.classList.add('opacity-0'); 
                    setTimeout(() => { backdrop.classList.add('hidden'); }, 300); 
                }
            }
        }
    };

    // ==========================================
    // 2. DATA & STATE MANAGEMENT
    // ==========================================
    let serverData = {
        metrics: { leads: 0, confirmed: 0, confirmed_pax: 0, repeat_clients: 0, conversion: 0, untouched_leads: 0, funnel_engaged: 0 },
        raw_data: [], active_pipeline: [], sources: [], destinations: [], workload: [], reps: [], zones: [], daily: [], weekly: [], monthly: [], yearly: [], financial_data: []
    };
    
    let lastScale = 'weekly';
    let trendChart = null, sourceChart = null, unconfirmedStatusChart = null, destWorkloadChart = null, workloadChart = null, topDestNewChart = null, revenueTrendChart = null, revenueByRepChart = null, revenueByZoneChart = null;
    
    window.tsInstances = [];
    window.allPipelineData = [];
    window.confirmedBookings = []; let bkPage = 1, bkPageSize = 10, bkMaxPages = 1;
    window.allUntouchedData = []; let utPage = 1, utPageSize = 10, utMaxPages = 1;
    window.allCustomersData = []; let ldPage = 1, ldPageSize = 10, ldMaxPages = 1;
    window.financialData = []; let finPage = 1, finPageSize = 10, finMaxPages = 1;

    let ddData = []; let ddType = ''; let ddMaxPages = 1; let ddPage = 1; let ddPageSize = 10; let ddRawObj = null;
    window.currentFinFilterType = null; window.currentFinFilterValue = null; window.currentFinRawObj = null;

    let isFetching = false;
    window.isInitialLoad = true;
    let chartGridColor = '#f1f5f9';

    const isDarkTheme = () => document.documentElement.classList.contains('dark');
    const getUrl = p => window.location.origin === 'null' ? p.substring(1) : window.location.origin + (p.startsWith('/') ? p : '/' + p);

    function isPreviewEnv() {
        try { return window.location.origin === 'null' || window.location.href.startsWith('blob:') || window.location.hostname.includes('usercontent.goog'); }
        catch(e) { return true; }
    }

    const updateChartColors = (isDark) => {
        if (typeof Chart === 'undefined') return;
        Chart.defaults.color = isDark ? '#94a3b8' : '#64748b';
        chartGridColor = isDark ? '#334155' : '#f1f5f9';
        if (trendChart) { trendChart.options.scales.x.grid.color = chartGridColor; trendChart.options.scales.y.grid.color = chartGridColor; trendChart.update(); }
        if (revenueTrendChart) { revenueTrendChart.options.scales.x.grid.color = chartGridColor; revenueTrendChart.options.scales.y.grid.color = chartGridColor; revenueTrendChart.update(); }
        if (sourceChart) { sourceChart.update(); }
        if (unconfirmedStatusChart) { unconfirmedStatusChart.options.scales.x.grid.color = chartGridColor; unconfirmedStatusChart.update(); }
        if (destWorkloadChart) { destWorkloadChart.options.scales.x.grid.color = chartGridColor; destWorkloadChart.update(); }
        if (workloadChart) { workloadChart.options.scales.x.grid.color = chartGridColor; workloadChart.update(); }
        if (topDestNewChart) { topDestNewChart.options.scales.x.grid.color = chartGridColor; topDestNewChart.options.scales.y.grid.color = chartGridColor; topDestNewChart.update(); }
        if (revenueByRepChart) { revenueByRepChart.options.scales.x.grid.color = chartGridColor; revenueByRepChart.options.scales.y.grid.color = chartGridColor; revenueByRepChart.update(); }
        if (revenueByZoneChart) { revenueByZoneChart.options.scales.x.grid.color = chartGridColor; revenueByZoneChart.options.scales.y.grid.color = chartGridColor; revenueByZoneChart.update(); }
    };

    const themeToggleBtn = document.getElementById('themeToggle');
    if (themeToggleBtn) {
        themeToggleBtn.addEventListener('click', function() {
            const darkIcon = document.getElementById('themeToggleDarkIcon');
            const lightIcon = document.getElementById('themeToggleLightIcon');
            if (darkIcon) darkIcon.classList.toggle('hidden');
            if (lightIcon) lightIcon.classList.toggle('hidden');
            
            if (localStorage.getItem('color-theme') === 'light') {
                document.documentElement.classList.add('dark'); 
                localStorage.setItem('color-theme', 'dark'); 
                updateChartColors(true);
            } else {
                document.documentElement.classList.remove('dark'); 
                localStorage.setItem('color-theme', 'light'); 
                updateChartColors(false);
            }
        });
    }

    const getObjStr = (obj, keyName, fallback = '---') => {
        const searchKey = String(keyName).toLowerCase();
        const foundKey = Object.keys(obj).find(k => String(k).toLowerCase() === searchKey);
        return foundKey && obj[foundKey] != null && String(obj[foundKey]).toLowerCase() !== 'nan' ? String(obj[foundKey]) : fallback;
    };

    const getVal = (obj, k, f=0) => { 
        let v = getObjStr(obj, k, f); 
        return typeof v === 'string' ? parseFloat(v.replace(/[^\d.-]/g,'')) : v; 
    };
    
    const fmtDate = (d) => { 
        if(!d || d === '---') return '---'; 
        let dStr = String(d).split('T')[0].split(' ')[0];
        let p = dStr.split('-'); 
        if (p.length !== 3) return dStr;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${p[2]}-${months[parseInt(p[1])-1]}-${p[0].slice(-2)}`;
    };

    const sortDescByDate = (a, b) => {
        const da = new Date(a.DateStr || a['Contacted Date'] || a['Date'] || a['Contact Date'] || 0);
        const db = new Date(b.DateStr || b['Contacted Date'] || b['Date'] || b['Contact Date'] || 0);
        return db - da;
    };

    const getWeekDateRange = (year, week) => {
        const d = new Date(year, 0, 1);
        d.setDate(d.getDate() - d.getDay() + 1 + ((week - 1) * 7));
        const start = d.toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
        d.setDate(d.getDate() + 6);
        const end = d.toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
        return `${start} - ${end}`;
    };

    const getWeekStr = (dStr) => {
        if (!dStr || dStr === '---') return '';
        let d = new Date(dStr);
        if (isNaN(d.getTime())) return '';
        d.setHours(0, 0, 0, 0);
        d.setDate(d.getDate() + 4 - (d.getDay()||7));
        let yearStart = new Date(d.getFullYear(),0,1);
        let weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        return `${d.getFullYear()}-W${String(weekNo).padStart(2, '0')}`;
    };

    const getAggKey = (r, scale) => {
        let dStr = r.DateStr || r['Contacted Date'] || r['Date'] || r['Contact Date'];
        if (!dStr) return null;
        let standardDate = "";
        if (dStr.includes('T')) dStr = dStr.split('T')[0];
        if (dStr.includes('-')) {
            let p = dStr.split('-');
            if (p[0].length === 4) standardDate = dStr; 
            else if (p[2].length === 4) standardDate = `${p[2]}-${p[1]}-${p[0]}`; 
        } else {
            let dt = new Date(dStr);
            if(!isNaN(dt.getTime())) {
                standardDate = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
            }
        }
        if (!standardDate) return null;
        
        if (scale === 'daily') return standardDate;
        if (scale === 'monthly') return standardDate.substring(0, 7);
        if (scale === 'yearly') return standardDate.substring(0, 4);
        if (scale === 'weekly') return getWeekStr(standardDate);
        return null;
    };

    const showLoading = () => { 
        let el = document.getElementById('loadingOverlay');
        let card = document.getElementById('loadingCard'); 
        if (el && card) { 
            el.style.display = 'flex'; 
            setTimeout(() => { el.style.opacity = '1'; card.style.opacity = '1'; card.style.transform = 'scale(1)'; }, 10); 
        }
    };
    
    const hideLoading = () => { 
        let el = document.getElementById('loadingOverlay');
        let card = document.getElementById('loadingCard'); 
        if (el && card) { 
            el.style.opacity = '0'; card.style.opacity = '0'; 
            setTimeout(() => { el.style.display = 'none'; }, 300); 
        }
    };

    // ==========================================
    // 3. INITIALIZATION ON LOAD
    // ==========================================
    window.addEventListener('DOMContentLoaded', () => {
        const elMenuToggle = document.getElementById('menuToggle');
        if (elMenuToggle) {
            elMenuToggle.addEventListener('click', window.toggleMenu);
        }
    });

    window.addEventListener('load', async () => {
        if (typeof Chart !== 'undefined' && typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        if (isDarkTheme()) {
            const lightIcon = document.getElementById('themeToggleLightIcon'); 
            if(lightIcon) lightIcon.classList.remove('hidden');
        } else {
            const darkIcon = document.getElementById('themeToggleDarkIcon'); 
            if(darkIcon) darkIcon.classList.remove('hidden');
        }
        
        showLoading(); 
        try {
            if (isPreviewEnv()) throw new Error("Preview Env Bypass");

            const res = await fetch(getUrl(`/api/check_session?table=client_contacts_leads`)); 
            if (res.ok) {
                const data = await res.json();
                if (data.active) {
                    if (data.status && data.status.includes('Auto-loaded')) {
                        const syncFileEl = document.getElementById('headerSyncFileName');
                        if (syncFileEl) syncFileEl.innerText = `(${data.status.split('Auto-loaded ')[1].split(' [')[0]})`;
                    }
                    if (data.filters) updateFilters(data.filters); 
                    await loadCharts(false); 
                    window.isInitialLoad = false;
                    return;
                }
            }
            throw new Error("No active session or API empty");
        } catch(e) {
            console.warn("API check failed. Fallback UI init.");
            const content = document.getElementById('dashboardContent');
            if (content) { 
                content.classList.remove('hidden'); 
                setTimeout(() => { content.classList.remove('opacity-0'); }, 10); 
            }

            try {
                let injectedData = [];
                const flaskDataEl = document.getElementById('flask-data');
                if (flaskDataEl) {
                    const rawText = flaskDataEl.textContent.trim();
                    if (rawText && rawText !== '""' && rawText !== '[]') {
                        try { injectedData = JSON.parse(rawText); } catch(err) { console.warn("Could not parse JSON fallback."); }
                    }
                }
                if (injectedData && Array.isArray(injectedData) && injectedData.length > 0) {
                    serverData.raw_data = injectedData;
                    window.allCustomersData = injectedData;
                    let leads = injectedData.length;
                    let confirmed = injectedData.filter(d => { 
                        let st = String(d.Status||'').toLowerCase(); 
                        return st.includes('success') || st.includes('closed') || st.includes('confirm') || st.includes('booked'); 
                    }).length;
                    let pax = injectedData.reduce((sum, d) => sum + (parseInt(d.Pax) || 0), 0);
                    serverData.metrics.leads = leads; 
                    serverData.metrics.confirmed = confirmed; 
                    serverData.metrics.confirmed_pax = pax; 
                    serverData.metrics.conversion = leads ? Math.round((confirmed/leads)*100) : 0;
                    
                    const mLeadsEl = document.getElementById('m-leads'); if(mLeadsEl) mLeadsEl.innerText = leads.toLocaleString(); 
                    const mConfirmedEl = document.getElementById('m-confirmed'); if(mConfirmedEl) mConfirmedEl.innerText = confirmed.toLocaleString(); 
                    const mPaxEl = document.getElementById('m-pax'); if(mPaxEl) mPaxEl.innerText = pax.toLocaleString(); 
                    const mConvEl = document.getElementById('m-conv'); if(mConvEl) mConvEl.innerText = serverData.metrics.conversion + '%';
                    
                    let revTotal = 0;
                    injectedData.forEach(d => {
                        let st = String(d.Status||'').toLowerCase();
                        if (st.includes('success') || st.includes('closed') || st.includes('confirm') || st.includes('booked')) {
                            revTotal += parseFloat(String(d.Revenue || d.Total || d.Amount || '0').replace(/[^\d.-]/g, '')) || 0;
                        }
                    });
                    const mRevenueEl = document.getElementById('m-revenue');
                    if (mRevenueEl) mRevenueEl.innerText = '$' + Math.round(revTotal).toLocaleString();
                }
            } catch(err) {
                console.error("Fallback error", err);
            }

            renderAnalyticCharts();
            renderTopDestChart();
            updateTrend();
            window.isInitialLoad = false;
            hideLoading();
        }
    });

    const headerUploadBtn = document.getElementById('headerUploadBtn');
    if (headerUploadBtn) {
        headerUploadBtn.addEventListener('click', () => {
            const input = document.getElementById('fileInput');
            if (input) input.click();
        });
    }
    
    const fileInput = document.getElementById('fileInput');
    if (fileInput) {
        fileInput.addEventListener('change', async (e) => {
            if (isPreviewEnv()) return alert("File uploads require the local Flask backend to be running.");
            if (!e.target.files.length) return;
            const fd = new FormData(); 
            fd.append('file', e.target.files[0]);
            showLoading();
            try {
                const res = await fetch(getUrl('/api/upload'), { method: 'POST', body: fd }); 
                const data = await res.json();
                if (data.sheets) {
                    const sheetSelect = document.getElementById('sheetSelect');
                    if (sheetSelect) {
                        sheetSelect.innerHTML = data.sheets.map(s => `<option value="${s}">${s}</option>`).join('');
                    }
                    const syncFileName = document.getElementById('headerSyncFileName');
                    if (syncFileName) syncFileName.innerText = `(${e.target.files[0].name})`;
                    const sheetContainer = document.getElementById('headerSheetContainer');
                    if (sheetContainer) sheetContainer.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            } 
            hideLoading();
        });
    }

    const loadBtn = document.getElementById('loadBtn');
    if (loadBtn) {
        loadBtn.addEventListener('click', async () => {
            showLoading();
            try {
                if (isPreviewEnv()) { 
                    alert("Sync requires backend server."); 
                    hideLoading(); 
                    return; 
                }
                const sheetSelect = document.getElementById('sheetSelect');
                await fetch(getUrl('/api/select_sheet'), { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ sheet: sheetSelect ? sheetSelect.value : '' }) 
                });
                
                const sheetContainer = document.getElementById('headerSheetContainer');
                if (sheetContainer) sheetContainer.classList.add('hidden');
                
                const chk = await fetch(getUrl(`/api/check_session?table=client_contacts_leads`)); 
                const chkData = await chk.json();
                if(chkData.active) { 
                    updateFilters(chkData.filters); 
                    await loadCharts(false); 
                }
            } catch (err) {
                console.error(err);
            } 
            hideLoading();
        });
    }

    function getFirstDayOfMonth() { 
        const today = new Date(); 
        const y = today.getFullYear(); 
        const m = String(today.getMonth() + 1).padStart(2, '0'); 
        return `${y}-${m}-01`; 
    }
    
    function getTodayDate() { 
        const today = new Date(); 
        const y = today.getFullYear(); 
        const m = String(today.getMonth() + 1).padStart(2, '0'); 
        const d = String(today.getDate()).padStart(2, '0'); 
        return `${y}-${m}-${d}`; 
    }

    function updateFilters(f) {
        const wsSelect = document.getElementById('workspaceSelect');
        const currWs = wsSelect ? (wsSelect.value || 'all') : 'all';
        
        if (window.tsInstances) {
            window.tsInstances.forEach(ts => ts.destroy()); 
        }
        window.tsInstances = [];
        
        if (wsSelect) {
            wsSelect.innerHTML = `<option value="all">Select (Sale Rep)</option>` + (f.reps || []).map(v => `<option value="${v}">${v}</option>`).join('');
            if ((f.reps || []).includes(currWs)) {
                wsSelect.value = currWs;
            }
        }

        const startD = document.getElementById('startD');
        const endD = document.getElementById('endD');
        const sDate = window.isInitialLoad ? getFirstDayOfMonth() : (startD ? startD.value : (f.min_date || getFirstDayOfMonth()));
        const eDate = window.isInitialLoad ? getTodayDate() : (endD ? endD.value : (f.max_date || getTodayDate()));

        const row = document.getElementById('filterRow');
        if (row) {
            row.innerHTML = `
                <div class="flex flex-col flex-1 min-w-[140px]"><select id="zoneF" class="ts-select w-full">${['all', ...(f.zones || [])].map(v => `<option value="${v}">${v === 'all' ? 'All Zones' : v}</option>`).join('')}</select></div>
                <div class="flex flex-col flex-1 min-w-[140px]"><select id="destF" class="ts-select w-full">${['all', ...(f.destinations || [])].map(v => `<option value="${v}">${v === 'all' ? 'All Destinations' : v}</option>`).join('')}</select></div>
                <div class="flex flex-col flex-1 min-w-[140px]"><select id="statusF" class="ts-select w-full">${['all', ...(f.statuses || [])].map(v => `<option value="${v}">${v === 'all' ? 'All Statuses' : v}</option>`).join('')}</select></div>
                <div class="flex flex-col flex-1 min-w-[140px]"><input type="date" id="startD" value="${sDate}" class="px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-sm font-medium outline-none focus:border-blue-500 dark:text-white w-full h-[42px]" /></div>
                <div class="flex flex-col flex-1 min-w-[140px]"><input type="date" id="endD" value="${eDate}" class="px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-sm font-medium outline-none focus:border-blue-500 dark:text-white w-full h-[42px]" /></div>
            `;
            row.classList.remove('hidden');
            
            if (typeof TomSelect !== 'undefined') {
                document.querySelectorAll('#filterRow select.ts-select, #workspaceSelect').forEach(el => {
                    const ts = new TomSelect(el, { create: false }); 
                    window.tsInstances.push(ts); 
                    ts.on('change', () => loadCharts(true));
                });
            }
            document.querySelectorAll('#filterRow input[type="date"]').forEach(el => {
                el.addEventListener('change', () => loadCharts(true));
            });
        }
    }

    function populateModalSelect(id, dataList, key, defaultLabel, onChangeCallback, defaultVal = null) {
        const el = document.getElementById(id); 
        if (!el) return;
        
        const uniqueVals = [...new Set(dataList.map(r => getObjStr(r, key, '---')))].filter(v => v !== '---').sort();
        if (el.tomselect) el.tomselect.destroy();
        
        el.innerHTML = `<option value="all">${defaultLabel}</option>` + uniqueVals.map(v => `<option value="${v}">${v}</option>`).join('');
        
        if (defaultVal && uniqueVals.includes(defaultVal)) {
            el.value = defaultVal;
        } else {
            el.value = 'all';
        }

        if (typeof TomSelect !== 'undefined') {
            const ts = new TomSelect(el, { create: false, dropdownParent: 'body' });
            if (onChangeCallback) ts.on('change', onChangeCallback);
        }
    }

    window.updateView = function(scale) {
        lastScale = scale;
        document.querySelectorAll('.trend-btn').forEach(btn => {
            if (btn.dataset.scale === scale) { 
                btn.classList.add('bg-white', 'dark:bg-slate-700', 'text-slate-900', 'dark:text-white', 'shadow-sm'); 
                btn.classList.remove('text-slate-500', 'dark:text-slate-400', 'hover:text-slate-800');
            } else { 
                btn.classList.remove('bg-white', 'dark:bg-slate-700', 'text-slate-900', 'dark:text-white', 'shadow-sm'); 
                btn.classList.add('text-slate-500', 'dark:text-slate-400', 'hover:text-slate-800'); 
            }
        });
        updateTrend();
    };

    async function loadCharts(isFilterChange = false) {
        if (isFetching) return; 
        isFetching = true;
        const content = document.getElementById('dashboardContent');
        if (isFilterChange) { 
            if (content) content.classList.add('opacity-50', 'pointer-events-none'); 
        } else { 
            showLoading(); 
        }

        try {
            if (isPreviewEnv()) throw new Error("Preview Env Bypass");

            const destF = document.getElementById('destF');
            const zoneF = document.getElementById('zoneF');
            const workspaceSelect = document.getElementById('workspaceSelect');
            const statusF = document.getElementById('statusF');
            const startD = document.getElementById('startD');
            const endD = document.getElementById('endD');

            const p = new URLSearchParams({ 
                table: 'client_contacts_leads',
                destination: destF ? destF.value : 'all', 
                zone: zoneF ? zoneF.value : 'all', 
                rep: workspaceSelect ? workspaceSelect.value : 'all',
                status: statusF ? statusF.value : 'all',
                start_date: startD ? startD.value : '', 
                end_date: endD ? endD.value : '' 
            });
            
            const res = await fetch(getUrl(`/api/data?${p.toString()}`));
            if (!res.ok) throw new Error("Network response error");
            
            const fetchedData = await res.json();
            serverData = { ...serverData, ...fetchedData }; 
            
            let yearlyMap = {};
            (serverData.monthly || []).forEach(m => {
                let year = String(m.Month || '').split('-')[0];
                if (!year) return;
                if (!yearlyMap[year]) yearlyMap[year] = { Year: year, Leads: 0, Confirmed: 0 };
                yearlyMap[year].Leads += (m.Leads || 0);
                yearlyMap[year].Confirmed += (m.Confirmed || 0);
            });
            serverData.yearly = Object.values(yearlyMap);
            
            if (content) { 
                content.classList.remove('hidden'); 
                setTimeout(() => { content.classList.remove('opacity-0'); }, 10); 
            }
            
            const m = serverData.metrics;
            if (m) {
                const mLeadsEl = document.getElementById('m-leads'); if(mLeadsEl) mLeadsEl.innerText = (m.leads || 0).toLocaleString();
                const mConfirmedEl = document.getElementById('m-confirmed'); if(mConfirmedEl) mConfirmedEl.innerText = (m.confirmed || 0).toLocaleString();
                const mPaxEl = document.getElementById('m-pax'); if(mPaxEl) mPaxEl.innerText = (m.confirmed_pax || 0).toLocaleString();
                const mRepeatEl = document.getElementById('m-repeat'); if(mRepeatEl) mRepeatEl.innerText = (m.repeat_clients || 0).toLocaleString();
                const mConvEl = document.getElementById('m-conv'); if(mConvEl) mConvEl.innerText = (m.conversion || 0) + '%';
                
                const untouchCard = document.getElementById('card-untouched');
                const mUntouchedEl = document.getElementById('m-untouched');
                const lblUntouched = document.getElementById('lbl-untouched');
                const iconBgUntouched = document.getElementById('icon-bg-untouched');

                if (mUntouchedEl) mUntouchedEl.innerText = (m.untouched_leads || 0).toLocaleString();
                
                if (untouchCard && mUntouchedEl && lblUntouched && iconBgUntouched) {
                    if (m.untouched_leads > 0) {
                        untouchCard.classList.replace('border-slate-200/60', 'border-rose-400'); untouchCard.classList.replace('dark:border-slate-700/60', 'dark:border-rose-500');
                        mUntouchedEl.classList.replace('text-slate-700', 'text-rose-600'); mUntouchedEl.classList.replace('dark:text-slate-300', 'dark:text-rose-400');
                        lblUntouched.classList.replace('text-slate-500', 'text-rose-500');
                        iconBgUntouched.classList.replace('bg-slate-50', 'bg-rose-50'); iconBgUntouched.classList.replace('dark:bg-slate-700', 'dark:bg-rose-900/30');
                        iconBgUntouched.classList.replace('text-slate-500', 'text-rose-500'); iconBgUntouched.classList.add('animate-pulse');
                    } else {
                        untouchCard.classList.replace('border-rose-400', 'border-slate-200/60'); untouchCard.classList.replace('dark:border-rose-500', 'dark:border-slate-700/60');
                        mUntouchedEl.classList.replace('text-rose-600', 'text-slate-700'); mUntouchedEl.classList.replace('dark:text-rose-400', 'dark:text-slate-300');
                        lblUntouched.classList.replace('text-rose-500', 'text-slate-500');
                        iconBgUntouched.classList.replace('bg-rose-50', 'bg-slate-50'); iconBgUntouched.classList.replace('dark:bg-rose-900/30', 'dark:bg-slate-700');
                        iconBgUntouched.classList.replace('text-rose-500', 'text-slate-500'); iconBgUntouched.classList.remove('animate-pulse');
                    }
                }

                const funnelContainer = document.getElementById('funnelContainer');
                if (funnelContainer) {
                    funnelContainer.innerHTML = `
                        <div class="flex flex-col w-full relative justify-center gap-2 py-2">
                            <div class="w-full bg-slate-50 dark:bg-slate-900/50 rounded-xl p-4 flex justify-between items-center border border-slate-100 dark:border-slate-700/50">
                                <span class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">1. Leads</span><span class="text-2xl font-bold text-slate-800 dark:text-white tabular-nums">${(m.leads||0).toLocaleString()}</span>
                            </div>
                            <div class="w-[2px] h-3 bg-slate-200 dark:bg-slate-700 mx-auto"></div>
                            <div class="w-full bg-blue-50/50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 rounded-xl p-4 flex justify-between items-center">
                                <span class="text-xs font-bold text-blue-600 dark:text-blue-400 uppercase tracking-wider">2. Engaged</span>
                                <div class="flex items-baseline gap-3"><span class="text-sm font-bold text-blue-500 dark:text-blue-400/80 tabular-nums">${m.leads ? Math.round((m.funnel_engaged/m.leads)*100) : 0}%</span><span class="text-2xl font-bold text-blue-700 dark:text-blue-300 tabular-nums">${(m.funnel_engaged||0).toLocaleString()}</span></div>
                            </div>
                            <div class="w-[2px] h-3 bg-blue-200 dark:bg-blue-800/50 mx-auto"></div>
                            <div class="w-full bg-emerald-50/50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800/50 rounded-xl p-4 flex justify-between items-center">
                                <span class="text-xs font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-wider">3. Won</span>
                                <div class="flex items-baseline gap-3"><span class="text-sm font-bold text-emerald-500 dark:text-emerald-400/80 tabular-nums">${m.leads ? Math.round((m.confirmed/m.leads)*100) : 0}%</span><span class="text-2xl font-bold text-emerald-700 dark:text-emerald-300 tabular-nums">${(m.confirmed||0).toLocaleString()}</span></div>
                            </div>
                        </div>
                    `;
                }
            }

            window.allPipelineData = serverData.active_pipeline || [];
            window.confirmedBookings = (serverData.raw_data || []).filter(r => { const status = String(r.Status || '').toUpperCase(); return status.includes('6-CONFIRMED') || status.includes('BOOKED') || status.includes('CLOSED'); }).sort(sortDescByDate);
            window.allUntouchedData = (serverData.raw_data || []).filter(r => { const status = String(r.Status || '').toUpperCase(); const note = String(r.Noted || '').toLowerCase().trim(); const isUt = status.includes('NEW LEAD') || status.includes('NO ANSWER') || status.includes('1-NEW LEAD'); return isUt && ['', 'nan', 'none', 'not specified', '0', 'no reason'].includes(note); }).sort(sortDescByDate);
            
            window.allCustomersData = serverData.raw_data || [];
            window.financialData = (serverData.financial_data && serverData.financial_data.length > 0) ? serverData.financial_data : window.confirmedBookings;

            let finRevTotal = 0;
            window.financialData.forEach(r => {
                let revStr = getObjStr(r, 'Revenue', getObjStr(r, 'Total', getObjStr(r, 'Amount', '0')));
                let rev = parseFloat(String(revStr).replace(/[^\d.-]/g, '')) || 0;
                finRevTotal += rev;
            });
            const revEl = document.getElementById('m-revenue');
            if (revEl) revEl.innerText = '$' + Math.round(finRevTotal).toLocaleString();

            const renderLeaderboard = (id, footId, data, keyName, colorName, showConvTotal) => {
                const elBody = document.getElementById(id);
                const elFoot = document.getElementById(footId);
                if (!elBody || !elFoot) return;

                let finMap = {};
                window.financialData.forEach(r => {
                    let k = getObjStr(r, keyName, getObjStr(r, 'Sale Rep', getObjStr(r, 'Zone', 'Unknown')));
                    let revStr = getObjStr(r, 'Revenue', getObjStr(r, 'Total', getObjStr(r, 'Amount', '0')));
                    finMap[k] = (finMap[k] || 0) + (parseFloat(String(revStr).replace(/[^\d.-]/g, '')) || 0);
                });

                let totalLeads = 0, totalBookings = 0, totalConfPax = 0, totalRev = 0;
                
                data.forEach(r => { 
                    totalLeads += r.Leads || 0; 
                    totalBookings += r.Confirmed || 0; 
                    totalConfPax += r.Confirmed_Pax || 0; 
                    
                    const label = getObjStr(r, keyName, getObjStr(r, 'Sale Rep', getObjStr(r, 'Zone', 'Unknown')));
                    totalRev += (finMap[label] || 0);
                });

                elBody.innerHTML = [...data].sort((a, b) => { 
                    const confA = a.Confirmed || 0; const confB = b.Confirmed || 0;
                    const revA = finMap[getObjStr(a, keyName, 'Unknown')] || 0;
                    const revB = finMap[getObjStr(b, keyName, 'Unknown')] || 0;
                    return confB !== confA ? confB - confA : revB - revA; 
                }).slice(0, 10).map((r, i) => {
                    const label = getObjStr(r, keyName, getObjStr(r, 'Sale Rep', getObjStr(r, 'Zone', 'Unknown')));
                    const conv = r.Leads > 0 ? (r.Confirmed / r.Leads * 100).toFixed(1) : 0;
                    const rev = finMap[label] || 0;
                    let rankHTML = `<span class="text-slate-400 text-xs font-bold w-5 inline-block text-center">${i+1}</span>`;
                    if(i===0) {
                        rankHTML = `<span class="text-amber-500"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></span>`;
                    }
                    const typeParam = keyName === 'Sale Rep' ? 'rep-perf' : 'zone-perf';
                    return `
                    <tr class="hover:bg-slate-50 dark:bg-slate-700/30 transition-colors cursor-pointer" onclick="openDrilldownModal('${typeParam}', '${label.replace(/'/g, "\\'")}')">
                        <td class="px-6 py-3 font-medium text-slate-700 dark:text-slate-200 text-sm flex items-center gap-3 truncate">${rankHTML} <span class="truncate">${label}</span></td>
                        <td class="px-4 py-3 text-center text-xs text-slate-500">${(r.Leads || 0).toLocaleString()}</td>
                        <td class="px-4 py-3 text-center text-sm font-semibold text-${colorName}-600">${(r.Confirmed || 0).toLocaleString()}</td>
                        <td class="px-4 py-3 text-center text-sm font-semibold text-slate-700 dark:text-slate-300">${(r.Confirmed_Pax || 0).toLocaleString()}</td>
                        <td class="px-4 py-3 text-right text-sm font-bold text-emerald-600 dark:text-emerald-400">$${Math.round(rev).toLocaleString()}</td>
                        <td class="px-6 py-3 min-w-[80px]"><div class="flex items-center justify-between gap-2"><div class="hidden sm:block w-full bg-slate-100 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden"><div class="h-full bg-${colorName}-500 rounded-full" style="width: ${conv}%"></div></div><span class="text-xs font-semibold text-slate-600 dark:text-slate-400">${conv}%</span></div></td>
                    </tr>`;
                }).join('');
                
                const avgConv = totalLeads > 0 ? (totalBookings / totalLeads * 100).toFixed(1) : 0;
                elFoot.innerHTML = `<tr><td class="px-6 py-4 font-semibold text-slate-800 dark:text-white text-xs uppercase">Overall Total</td><td class="px-4 py-4 text-center text-xs font-bold text-slate-800 dark:text-white">${totalLeads.toLocaleString()}</td><td class="px-4 py-4 text-center text-sm font-bold text-${colorName}-600">${totalBookings.toLocaleString()}</td><td class="px-4 py-4 text-center text-sm font-bold text-slate-800 dark:text-white">${totalConfPax.toLocaleString()}</td><td class="px-4 py-4 text-right text-sm font-bold text-emerald-600 dark:text-emerald-400">$${Math.round(totalRev).toLocaleString()}</td><td class="px-6 py-4">${showConvTotal ? `<span class="text-sm font-bold text-slate-800 dark:text-white">${avgConv}%</span>` : ''}</td></tr>`;
            };

            if (serverData.reps) renderLeaderboard('repTableBody', 'repTableFoot', serverData.reps, 'Sale Rep', 'emerald', false);
            if (serverData.zones) renderLeaderboard('zoneTableBody', 'zoneTableFoot', serverData.zones, 'Zone', 'indigo', true);
            
            renderAnalyticCharts(); 
            renderTopDestChart(); 
            updateTrend();

        } catch (err) {
            console.error("Dashboard Render Error:", err);
            if (content) { 
                content.classList.remove('hidden'); 
                setTimeout(() => { content.classList.remove('opacity-0'); }, 10); 
            }
        } finally {
            if (isFilterChange && content) {
                content.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                hideLoading();
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
            isFetching = false;
        }
    }

    // ==========================================
    // CHART RENDERING FUNCTIONS
    // ==========================================
    function renderAnalyticCharts() {
        const isDark = isDarkTheme(); 
        const gridColor = isDark ? '#334155' : '#f1f5f9'; 
        const labelColor = isDark ? '#94a3b8' : '#64748b';
        
        // 1. Lead Sources
        if (sourceChart) sourceChart.destroy();
        const srcData = (serverData.sources || []).filter(s => s.Source && String(s.Source) !== '0' && String(s.Source).toLowerCase() !== 'nan').sort((a,b) => b.Leads - a.Leads).slice(0, 5);
        if (srcData.length > 0) {
            const el = document.getElementById('chartSources');
            if (el) {
                sourceChart = new Chart(el, {
                    type: 'doughnut', 
                    data: { 
                        labels: srcData.map(d => d.Source), 
                        datasets: [{ 
                            data: srcData.map(d => d.Leads), 
                            backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444'], 
                            borderWidth: 0, 
                            hoverOffset: 4 
                        }] 
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { 
                            legend: { position: 'bottom', labels: { font: { family: 'Inter', size: 11 }, color: labelColor } }, 
                            datalabels: { color: '#fff', font: { weight: 'bold', size: 11 }, formatter: (v, ctx) => { let sum = ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0); let p = Math.round((v * 100) / sum); return p > 5 ? p + "%" : ""; } } 
                        }, 
                        cutout: '65%' 
                    }
                });
            }
        }

        // 2. Unconfirmed Status
        if (unconfirmedStatusChart) unconfirmedStatusChart.destroy();
        const statusMap = {};
        (serverData.raw_data || []).forEach(r => {
            const stUpper = String(r.Status || '').toUpperCase(); 
            const isConf = stUpper.includes('6-CONFIRMED') || stUpper.includes('BOOKED') || stUpper.includes('CLOSED') || stUpper.includes('PAID') || stUpper.includes('SUCCESS');
            if (!isConf && !stUpper.includes('CANCEL')) { 
                let st = getObjStr(r, 'Status', 'Not Specified'); 
                if (!st || st === '0' || String(st).toLowerCase() === 'nan' || String(st).trim() === '') st = 'Not Specified'; 
                statusMap[st] = (statusMap[st] || 0) + 1; 
            }
        });
        const unconfData = Object.keys(statusMap).map(s => ({ status: s, count: statusMap[s] })).sort((a,b) => b.count - a.count).slice(0, 10);
        if (unconfData.length > 0) {
            const el = document.getElementById('chartUnconfirmedStatus');
            if (el) {
                unconfirmedStatusChart = new Chart(el, {
                    type: 'bar', 
                    data: { labels: unconfData.map(d => d.status.substring(0, 15)), datasets: [{ data: unconfData.map(d => d.count), backgroundColor: '#ef4444', borderRadius: 4 }] },
                    options: { 
                        indexAxis: 'y', responsive: true, maintainAspectRatio: false, 
                        plugins: { legend: { display: false }, datalabels: { align: 'right', anchor: 'end', color: '#ef4444', font: { weight: 'bold', size: 10 }, formatter: v => v + ' Leads' } }, 
                        scales: { x: { display: false, suggestedMax: Math.max(...unconfData.map(d => d.count)) * 1.2 }, y: { grid: { display: false }, border: { display: false }, ticks: { font: { family: 'Inter', size: 11 }, color: labelColor } } }, 
                        layout: { padding: { right: 35 } } 
                    }
                });
            }
        }

        // 3. Destination Workload
        if (destWorkloadChart) destWorkloadChart.destroy();
        const activeDestMap = {}; 
        (serverData.active_pipeline || []).forEach(r => { 
            const dest = (r.Destination && String(r.Destination).toLowerCase() !== 'not specified' && String(r.Destination) !== '0') ? String(r.Destination) : 'Unknown'; 
            if(dest !== 'Unknown') activeDestMap[dest] = (activeDestMap[dest] || 0) + 1; 
        });
        const dwData = Object.keys(activeDestMap).map(d => ({ dest: d, count: activeDestMap[d] })).sort((a,b) => b.count - a.count).slice(0, 5);
        if (dwData.length > 0) {
            const el = document.getElementById('chartDestWorkload');
            if (el) {
                destWorkloadChart = new Chart(el, {
                    type: 'bar', 
                    data: { labels: dwData.map(d => d.dest), datasets: [{ data: dwData.map(d => d.count), backgroundColor: '#8b5cf6', borderRadius: 4 }] },
                    options: { 
                        responsive: true, maintainAspectRatio: false, 
                        onClick: (e, active) => { if (active.length > 0) window.openDrilldownModal('dest', destWorkloadChart.data.labels[active[0].index]); }, 
                        onHover: (e, el) => { e.native.target.style.cursor = el[0] ? 'pointer' : 'default'; },
                        plugins: { legend: { display: false }, datalabels: { align: 'top', anchor: 'end', color: labelColor, font: { weight: 'bold' } } }, 
                        scales: { 
                            x: { grid: { display: false }, border: { display: false }, ticks: { font: { family: 'Inter', size: 11 }, color: labelColor, callback: function(val) { const label = this.getLabelForValue(val); return label.length > 12 ? label.substring(0, 12) + '...' : label; } } }, 
                            y: { display: false, suggestedMax: Math.max(...dwData.map(d => d.count)) * 1.2 } 
                        }, 
                        layout: { padding: { top: 20 } } 
                    }
                });
            }
        }

        // 4. Agent Workload
        if (workloadChart) workloadChart.destroy();
        const wlData = (serverData.workload || []).sort((a,b) => b.Pending_Leads - a.Pending_Leads).slice(0, 5);
        if (wlData.length > 0) {
            const el = document.getElementById('chartWorkload');
            if (el) {
                workloadChart = new Chart(el, {
                    type: 'bar', 
                    data: { labels: wlData.map(d => d['Sale Rep']), datasets: [{ data: wlData.map(d => d.Pending_Leads), backgroundColor: '#f59e0b', borderRadius: 4 }] },
                    options: { 
                        responsive: true, maintainAspectRatio: false, 
                        onClick: (e, active) => { if (active.length > 0) window.openDrilldownModal('rep', workloadChart.data.labels[active[0].index]); }, 
                        onHover: (e, el) => { e.native.target.style.cursor = el[0] ? 'pointer' : 'default'; },
                        plugins: { legend: { display: false }, datalabels: { align: 'top', anchor: 'end', color: labelColor, font: { weight: 'bold' } } }, 
                        scales: { 
                            x: { grid: { display: false }, border: { display: false }, ticks: { font: { family: 'Inter', size: 11 }, color: labelColor, callback: function(val) { const label = this.getLabelForValue(val); return label.length > 10 ? label.substring(0, 10) + '...' : label; } } }, 
                            y: { display: false, suggestedMax: Math.max(...wlData.map(d => d.Pending_Leads)) * 1.2 } 
                        }, 
                        layout: { padding: { top: 20 } } 
                    }
                });
            }
        }

        // 5. NEW: Revenue by Sale Rep
        if (revenueByRepChart) revenueByRepChart.destroy();
        let revRepStats = {};
        window.financialData.forEach(r => {
            const rep = getObjStr(r, 'Sale Rep', getObjStr(r, 'Rep', 'Unknown')).trim();
            const revStr = getObjStr(r, 'Revenue', getObjStr(r, 'Total', getObjStr(r, 'Amount', '0')));
            const rev = parseFloat(String(revStr).replace(/[^\d.-]/g, '')) || 0;
            if (rep !== 'Unknown' && rep !== '---' && rep !== '') { revRepStats[rep] = (revRepStats[rep] || 0) + rev; }
        });
        const topRevReps = Object.keys(revRepStats).map(k => ({ name: k, rev: revRepStats[k] })).sort((a,b) => b.rev - a.rev).slice(0, 10);
        if (topRevReps.length > 0) {
            const el = document.getElementById('chartRevenueByRep');
            if (el) {
                revenueByRepChart = new Chart(el, {
                    type: 'bar',
                    data: { labels: topRevReps.map(d => d.name), datasets: [{ data: topRevReps.map(d => Math.round(d.rev)), backgroundColor: '#10b981', borderRadius: 4 }] },
                    options: {
                        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false }, datalabels: { align: 'right', anchor: 'end', color: '#10b981', font: { weight: 'bold', size: 10 }, formatter: v => '$' + v.toLocaleString() } },
                        scales: { x: { display: false, suggestedMax: Math.max(...topRevReps.map(d => d.rev)) * 1.2 }, y: { grid: { display: false }, border: { display: false }, ticks: { font: { family: 'Inter', size: 11 }, color: labelColor } } },
                        layout: { padding: { right: 45 } }
                    }
                });
            }
        }

        // 6. NEW: Revenue by Zone
        if (revenueByZoneChart) revenueByZoneChart.destroy();
        let revZoneStats = {};
        window.financialData.forEach(r => {
            const zone = getObjStr(r, 'Zone', 'Unknown').trim();
            const revStr = getObjStr(r, 'Revenue', getObjStr(r, 'Total', getObjStr(r, 'Amount', '0')));
            const rev = parseFloat(String(revStr).replace(/[^\d.-]/g, '')) || 0;
            if (zone !== 'Unknown' && zone !== '---' && zone !== '') { revZoneStats[zone] = (revZoneStats[zone] || 0) + rev; }
        });
        const topRevZones = Object.keys(revZoneStats).map(k => ({ name: k, rev: revZoneStats[k] })).sort((a,b) => b.rev - a.rev).slice(0, 10);
        if (topRevZones.length > 0) {
            const el = document.getElementById('chartRevenueByZone');
            if (el) {
                revenueByZoneChart = new Chart(el, {
                    type: 'bar',
                    data: { labels: topRevZones.map(d => d.name), datasets: [{ data: topRevZones.map(d => Math.round(d.rev)), backgroundColor: '#6366f1', borderRadius: 4 }] },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false }, datalabels: { align: 'top', anchor: 'end', color: '#6366f1', font: { weight: 'bold', size: 10 }, formatter: v => '$' + v.toLocaleString() } },
                        scales: { x: { grid: { display: false }, border: { display: false }, ticks: { font: { family: 'Inter', size: 11 }, color: labelColor } }, y: { display: false, suggestedMax: Math.max(...topRevZones.map(d => d.rev)) * 1.2 } },
                        layout: { padding: { top: 20 } }
                    }
                });
            }
        }
    }

    function renderTopDestChart() {
        const isDark = isDarkTheme(); const labelColor = isDark ? '#94a3b8' : '#64748b'; const gridColor = isDark ? '#334155' : '#f1f5f9';
        if (topDestNewChart) topDestNewChart.destroy();
        
        let finDestMap = {};
        window.financialData.forEach(r => {
            let dest = getObjStr(r, 'Destination', 'Unknown');
            let revStr = getObjStr(r, 'Revenue', getObjStr(r, 'Total', getObjStr(r, 'Amount', '0')));
            finDestMap[dest] = (finDestMap[dest] || 0) + (parseFloat(String(revStr).replace(/[^\d.-]/g, '')) || 0);
        });

        // FIX: Only show destinations with Confirmed Bookings > 0
        let allDestData = (serverData.destinations || []).filter(d => d.Destination && String(d.Destination).toLowerCase() !== 'not specified' && String(d.Destination) !== '0' && (d.Confirmed > 0));
        allDestData.sort((a,b) => {
            const confA = a.Confirmed || 0; const confB = b.Confirmed || 0;
            return confB - confA;
        });

        const destData = allDestData.slice(0, 10);
        const el = document.getElementById('chartTopDestNew');
        if (el) {
            topDestNewChart = new Chart(el, {
                type: 'bar',
                data: {
                    labels: destData.map(d => String(d.Destination).substring(0, 15)),
                    datasets: [
                        { type: 'line', label: 'Conversion %', data: destData.map(d => d.Leads > 0 ? Math.round((d.Confirmed/d.Leads)*100) : 0), borderColor: '#8b5cf6', backgroundColor: '#8b5cf6', borderWidth: 2, tension: 0.4, yAxisID: 'y1', datalabels: { align: 'bottom', backgroundColor: '#8b5cf6', color: '#fff', borderRadius: 4, font: { weight: 'bold', size: 9 }, padding: 4, formatter: v => v + '%' } },
                        { type: 'bar', label: 'Leads', data: destData.map(d => d.Leads), backgroundColor: '#0ea5e9', borderRadius: 4, barPercentage: 0.6, yAxisID: 'y', datalabels: { align: 'top', anchor: 'end', color: labelColor, font: { size: 10 }, formatter: v => v > 0 ? v : '' } },
                        { type: 'bar', label: 'Won', data: destData.map(d => d.Confirmed), backgroundColor: '#10b981', borderRadius: 4, barPercentage: 0.6, yAxisID: 'y', datalabels: { align: 'top', anchor: 'end', color: labelColor, font: { size: 10 }, formatter: v => v > 0 ? v : '' } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                    onClick: (event, activeElements) => {
                        if (activeElements.length > 0) {
                            const idx = activeElements[0].index;
                            const fullDestName = destData[idx].Destination;
                            window.openDrilldownModal('dest', fullDestName);
                        }
                    },
                    onHover: (event, chartElement) => {
                        event.native.target.style.cursor = chartElement[0] ? 'pointer' : 'default';
                    },
                    plugins: { legend: { position: 'top', labels: { font: { family: 'Inter', color: labelColor }, usePointStyle: true } } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: 'Inter' }, color: labelColor } },
                        y: { type: 'linear', display: true, position: 'left', grid: { color: gridColor }, beginAtZero: true },
                        y1: { type: 'linear', display: true, position: 'right', grid: { display: false }, beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } }
                    }
                }
            });
        }

        const tbody = document.getElementById('destTableBody');
        if (tbody) {
            tbody.innerHTML = allDestData.map(d => {
                const leads = d.Leads || 0;
                const won = d.Confirmed || 0;
                const rev = finDestMap[d.Destination] || 0;
                const pct = leads > 0 ? Math.round((won/leads)*100) : 0;
                return `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors cursor-pointer group" onclick="openDrilldownModal('dest', '${String(d.Destination).replace(/'/g, "\\'")}')">
                    <td class="px-4 py-3">
                        <div class="text-xs font-bold text-slate-700 dark:text-slate-300 truncate max-w-[120px]" title="${d.Destination}">${d.Destination}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5">Conv: <span class="${pct >= 50 ? 'text-emerald-500' : 'text-blue-500'}">${pct}%</span></div>
                    </td>
                    <td class="px-4 py-3 text-center">
                        <span class="text-xs font-bold text-emerald-600 dark:text-emerald-400">${won}</span>
                        <span class="text-[10px] text-slate-400 mx-0.5">/</span>
                        <span class="text-xs text-slate-500">${leads}</span>
                    </td>
                    <td class="px-4 py-3 text-right text-xs font-bold text-emerald-600 dark:text-emerald-400">
                        $${Math.round(rev).toLocaleString()}
                    </td>
                </tr>
                `;
            }).join('');
        }
    }

    function updateTrend() {
        const isDark = isDarkTheme(); const gridColor = isDark ? '#334155' : '#f1f5f9'; const labelColor = isDark ? '#94a3b8' : '#64748b';
        
        // --- 1. CRM Lead Trend Chart ---
        const rawData = serverData[lastScale] || [];
        const sortKey = lastScale === 'weekly' ? 'Week' : (lastScale === 'monthly' ? 'Month' : (lastScale === 'yearly' ? 'Year' : 'DateStr'));
        const data = [...rawData].sort((a, b) => (a[sortKey] || '') > (b[sortKey] || '') ? 1 : -1);

        let finAgg = {};
        window.financialData.forEach(r => {
            let k = r[sortKey] || getAggKey(r, lastScale);
            if (!k) return;
            if (!finAgg[k]) finAgg[k] = { Revenue: 0, Pax: 0 };
            let revStr = getObjStr(r, 'Revenue', getObjStr(r, 'Total', getObjStr(r, 'Amount', '0')));
            finAgg[k].Revenue += parseFloat(String(revStr).replace(/[^\d.-]/g, '')) || 0;
            finAgg[k].Pax += parseInt(r.Pax) || parseInt(r.QTY) || parseInt(r.Adult) || parseInt(r.Quantity) || 0;
        });

        data.forEach(d => {
            let k = d[sortKey];
            d.FinRevenue = finAgg[k] ? finAgg[k].Revenue : 0;
            d.FinPax = finAgg[k] ? finAgg[k].Pax : 0;
        });
        
        const labels = data.map(d => {
            if (lastScale === 'yearly') return d.Year || '';
            if (lastScale === 'weekly') { let w = d.Week || ''; return String(w).includes('W') ? w : 'W' + w; }
            if (lastScale === 'monthly') {
                let m = String(d.Month || ''); if (!m.includes('-')) return m;
                let p = m.split('-'); const mm = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${mm[parseInt(p[1])-1]} ${p[0]}`;
            }
            return fmtDate(d.DateStr || '');

        if (trendChart) trendChart.destroy();
        const trendEl = document.getElementById('chartTrend');

                type: 'bar',
                data: { 
                    labels: labels, 
                    datasets: [
                        { 
                            type: 'line', 
                            label: 'Conversion %',

                            backgroundColor: '#8b5cf6',

                            borderDash: [5, 5],

                        { 
                            type: 'bar', 
                            label: 'Leads',

                            barPercentage: 0.6, 
                            yAxisID: 'y', 
                            order: 2,

    function renderLeadsTable() {
        const zF = document.getElementById('ldZoneFilter') ? document.getElementById('ldZoneFilter').value : 'all'; 
        const rF = document.getElementById('ldRepFilter') ? document.getElementById('ldRepFilter').value : 'all'; 
        const dF = document.getElementById('ldDestFilter') ? document.getElementById('ldDestFilter').value : 'all'; 
        const sF = document.getElementById('ldStatusFilter') ? document.getElementById('ldStatusFilter').value : 'all';
        const searchQ = document.getElementById('ldSearch') ? document.getElementById('ldSearch').value.toLowerCase().trim() : '';

        const filtered = window.allCustomersData.filter(r => {
            let match = true;
            if(zF !== 'all' && getObjStr(r, 'Zone', '').toLowerCase() !== zF.toLowerCase()) match = false;
            if(rF !== 'all' && getObjStr(r, 'Sale Rep', '').toLowerCase() !== rF.toLowerCase()) match = false;
            if(dF !== 'all' && getObjStr(r, 'Destination', '').toLowerCase() !== dF.toLowerCase()) match = false;
            if(sF !== 'all' && getObjStr(r, 'Status', '').toLowerCase() !== sF.toLowerCase()) match = false;
            if (match && searchQ) {
                const cName = getObjStr(r, 'Customer Name', '').toLowerCase(); 
                const cPhone = getObjStr(r, 'Contact Number', '').toLowerCase(); 
                const n = getObjStr(r, 'Noted', '').toLowerCase(); 
                const s = getObjStr(r, 'Source', '').toLowerCase();
                if (!cName.includes(searchQ) && !cPhone.includes(searchQ) && !n.includes(searchQ) && !s.includes(searchQ)) match = false;
            } 
            return match;
        });

        filtered.sort(sortDescByDate);

        let zoneStats = {};
        filtered.forEach(r => {
            const z = getObjStr(r, 'Zone', '---');
            const isConf = String(r.Status||'').toUpperCase().includes('CONFIRM') || String(r.Status||'').toUpperCase().includes('BOOKED') || String(r.Status||'').toUpperCase().includes('CLOSED') || String(r.Status||'').toUpperCase().includes('SUCCESS');
            if(!zoneStats[z]) zoneStats[z] = {leads:0, conf:0};
            zoneStats[z].leads++; if(isConf) zoneStats[z].conf++;
        });
        let zoneHtml = Object.entries(zoneStats).sort((a,b)=>b[1].leads-a[1].leads).map(([z, s]) => `<span class="font-semibold text-slate-700 dark:text-slate-300 whitespace-nowrap">${z}: <span class="text-blue-500">${s.leads}</span> <span class="text-emerald-500 font-bold">(${s.conf} won)</span></span>`).join('<span class="text-slate-300 dark:text-slate-600 mx-1.5">|</span>');
        
        const sumEl = document.getElementById('ldSummarySection');
        if (sumEl) sumEl.innerHTML = `<div class="flex items-center gap-2"><span class="text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider text-[10px]">Zone Summary:</span> <div class="flex items-center overflow-x-auto custom-scroll pb-1">${zoneHtml || 'No data'}</div></div>`;

        const total = filtered.length; ldMaxPages = Math.ceil(total / ldPageSize) || 1; if (ldPage > ldMaxPages) ldPage = ldMaxPages;
        const slice = filtered.slice((ldPage - 1) * ldPageSize, ldPage * ldPageSize);
        const tbody = document.getElementById('leadsTableBody');
        
        if (slice.length === 0) { 
            if(tbody) tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-8 text-center text-slate-400 text-sm">No leads found.</td></tr>`; 
        } else {
            if(tbody) {
                tbody.innerHTML = slice.map(r => `
                    <tr class="hover:bg-slate-50 dark:bg-slate-700/30 transition-colors group">
                        <td class="px-6 py-3 text-xs text-slate-500 whitespace-nowrap">${fmtDate(r.DateStr || r['Contacted Date'])}</td>
                        <td class="px-6 py-3">
                            <div class="text-sm font-semibold text-slate-800 dark:text-white">${getObjStr(r, 'Customer Name', 'Unknown')}</div>
                            <div class="text-xs text-blue-500 font-medium mt-0.5">${getObjStr(r, 'Contact Number', 'No Phone')}</div>
                        </td>
                        <td class="px-6 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 truncate max-w-[150px]">${getObjStr(r, 'Destination', '---')}</td>
                        <td class="px-6 py-3 text-xs text-slate-500">${getObjStr(r, 'Zone', '---')}</td>
                        <td class="px-6 py-3 text-sm font-semibold text-slate-700 dark:text-slate-300">${getObjStr(r, 'Sale Rep', '---')}</td>
                        <td class="px-6 py-3"><span class="px-2.5 py-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 text-[10px] font-bold uppercase rounded-md shadow-sm">${getObjStr(r, 'Status', '---')}</span></td>
                        <td class="px-6 py-3 text-[10px] font-bold uppercase tracking-wider text-slate-400">${getObjStr(r, 'Source', '---')}</td>
                        <td class="px-6 py-3 text-xs text-slate-500 italic max-w-[200px] truncate" title="${getObjStr(r, 'Noted', '---')}">${getObjStr(r, 'Noted', '---')}</td>
                    </tr>`).join('');
            }
        }
        const infoEl = document.getElementById('ldTableInfo');
        if(infoEl) infoEl.innerText = `Showing ${total ? (ldPage-1)*ldPageSize+1 : 0} to ${Math.min(ldPage*ldPageSize, total)} of ${total}`;
        
        const prevBtn = document.getElementById('ldPrevBtn');
        const nextBtn = document.getElementById('ldNextBtn');
        if(prevBtn) prevBtn.disabled = ldPage === 1; 
        if(nextBtn) nextBtn.disabled = ldPage >= ldMaxPages;
    }

    function renderFinancialTable() {
        const zF = document.getElementById('finZoneFilter') ? document.getElementById('finZoneFilter').value : 'all'; 
        const rF = document.getElementById('finRepFilter') ? document.getElementById('finRepFilter').value : 'all'; 
        const dF = document.getElementById('finDestFilter') ? document.getElementById('finDestFilter').value : 'all';
        const searchQ = document.getElementById('finSearch') ? document.getElementById('finSearch').value.toLowerCase().trim() : '';

        const filtered = window.financialData.filter(r => {
            let match = true;
            if(zF !== 'all' && getObjStr(r, 'Zone', '').toLowerCase() !== zF.toLowerCase()) match = false;
            if(rF !== 'all' && getObjStr(r, 'Sale Rep', '').toLowerCase() !== rF.toLowerCase()) match = false;
            if(dF !== 'all' && getObjStr(r, 'Destination', '').toLowerCase() !== dF.toLowerCase()) match = false;
            if (match && searchQ) {
                const cName = getObjStr(r, 'Customer Name', '').toLowerCase(); 
                const so = getObjStr(r, 'S.O No', getObjStr(r, 'SO No', '')).toLowerCase();
                if (!cName.includes(searchQ) && !so.includes(searchQ)) match = false;
            } 
            
            if (match && window.currentFinFilterType === 'trend-revenue' && window.currentFinRawObj) {
                if (lastScale === 'daily' && r.DateStr !== window.currentFinRawObj.DateStr) match = false;
                if (lastScale === 'weekly' && r.Week !== window.currentFinRawObj.Week) match = false;
                if (lastScale === 'monthly' && r.Month !== window.currentFinRawObj.Month) match = false;
                if (lastScale === 'yearly') {
                    let y = r.DateStr ? r.DateStr.substring(0, 4) : (r['Contacted Date'] ? r['Contacted Date'].substring(0, 4) : '');
                    if (y !== window.currentFinRawObj.Year) match = false;
                }
            }
            return match;
        });

        filtered.sort(sortDescByDate);

        let zoneStats = {}; let totalRev = 0, totalPax = 0;
        filtered.forEach(r => {
            const z = getObjStr(r, 'Zone', '---'); 
            const pax = parseInt(r.Pax) || parseInt(r.QTY) || parseInt(r.Adult) || parseInt(r.Quantity) || 0;
            const revStr = getObjStr(r, 'Revenue', getObjStr(r, 'Total', getObjStr(r, 'Amount', '0')));
            const rev = parseFloat(String(revStr).replace(/[^\d.-]/g, '')) || 0;
            if(!zoneStats[z]) zoneStats[z] = {pax: 0, rev: 0}; 
            zoneStats[z].pax += pax; zoneStats[z].rev += rev;
            totalPax += pax; totalRev += rev;
        });

        const zF = document.getElementById('finZoneFilter') ? document.getElementById('finZoneFilter').value : 'all';

        const filtered = window.financialData.filter(r => {
            let match = true;
            if(zF !== 'all' && getObjStr(r, 'Zone', '').toLowerCase() !== zF.toLowerCase()) match = false;
            if(rF !== 'all' && getObjStr(r, 'Sale Rep', '').toLowerCase() !== rF.toLowerCase()) match = false;
            if(dF !== 'all' && getObjStr(r, 'Destination', '').toLowerCase() !== dF.toLowerCase()) match = false;
            if (match && searchQ) {
                const cName = getObjStr(r, 'Customer Name', '').toLowerCase();

                if (!cName.includes(searchQ) && !so.includes(searchQ)) match = false;

            if (match && window.currentFinFilterType === 'trend-revenue' && window.currentFinRawObj) {
                if (lastScale === 'daily' && r.DateStr !== window.currentFinRawObj.DateStr) match = false;
                if (lastScale === 'weekly' && r.Week !== window.currentFinRawObj.Week) match = false;

                if (lastScale === 'yearly') {
                    let y = r.DateStr ? r.DateStr.substring(0, 4) : (r['Contacted Date'] ? r['Contacted Date'].substring(0, 4) : '');
                    if (y !== window.currentFinRawObj.Year) match = false;
                }
            }

        });

    };

        const summaryEl = document.getElementById('ddSummarySection');
        if (summaryEl) { 
            summaryEl.innerHTML = sumHtml; 
            summaryEl.classList.remove('hidden'); 
        }

        displayData.sort(sortDescByDate);

        const total = displayData.length; 
        ddMaxPages = Math.ceil(total / ddPageSize) || 1; 
        if (ddPage > ddMaxPages) ddPage = ddMaxPages;
        
        const slice = displayData.slice((ddPage - 1) * ddPageSize, ddPage * ddPageSize);

        if (slice.length === 0) { 
            if (tbodyEl) {
                tbodyEl.innerHTML = `<tr><td colspan="8" class="px-6 py-8 text-center text-slate-400 text-sm">No records found.</td></tr>`; 
            }
        } else {
            if (tbodyEl) {
                tbodyEl.innerHTML = slice.map((r, i) => {
                    const rowNum = (ddPage - 1) * ddPageSize + i + 1; 
                    const cName = getObjStr(r, 'Customer Name', 'Unknown Client'); 
                    const cPhone = getObjStr(r, 'Contact Number', 'No Phone'); 
                    const dest = getObjStr(r, 'Destination', '---'); 
                    const rep = getObjStr(r, 'Sale Rep', '---'); 
                    const zone = getObjStr(r, 'Zone', '---'); 
                    const pax = r.Pax || 0; 
                    const dt = fmtDate(r.DateStr || r['Contacted Date']); 
                    const note = getObjStr(r, 'Noted', getObjStr(r, 'Remark', '')); 
                    const st = getObjStr(r, 'Status', '---');

                    const cInfo = `<div class="text-sm font-semibold text-slate-800 dark:text-white truncate max-w-[150px]" title="${cName}">${cName}</div><div class="text-[10px] font-bold text-slate-400 mt-0.5 uppercase tracking-wider"><span class="text-blue-500">${cPhone}</span></div>`;
                    const destZone = `<div class="text-sm font-medium text-slate-700 dark:text-slate-300 truncate max-w-[150px]">${dest}</div><div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mt-0.5">${zone}</div>`;
                    const badge = `<span class="px-2.5 py-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 text-[10px] font-bold uppercase rounded-md shadow-sm tracking-wider">${st}</span>`;

                    if (ddType === 'rep') {
                        return `<tr class="hover:bg-slate-50 dark:bg-slate-700/30 transition-colors border-b border-slate-100 dark:border-slate-700/50"><td class="px-6 py-3 text-xs text-slate-500 whitespace-nowrap">${dt}</td><td class="px-6 py-3">${cInfo}</td><td class="px-6 py-3">${destZone}</td><td class="px-6 py-3 text-center text-sm font-semibold text-slate-700 dark:text-slate-300">${rep}</td><td class="px-6 py-3 text-center">${badge}</td><td class="px-6 py-3 text-xs text-slate-500 italic max-w-[200px] truncate" title="${note}">${note}</td></tr>`;
                    } else if (ddType === 'dest') {
                        return `<tr class="hover:bg-slate-50 dark:bg-slate-700/30 transition-colors border-b border-slate-100 dark:border-slate-700/50"><td class="px-6 py-3 text-xs text-slate-500 whitespace-nowrap">${dt}</td><td class="px-6 py-3">${cInfo}</td><td class="px-6 py-3 text-center text-sm font-semibold text-slate-700 dark:text-slate-300">${rep}</td><td class="px-6 py-3 text-center">${badge}</td><td class="px-6 py-3 text-xs text-slate-500 italic max-w-[200px] truncate" title="${note}">${note}</td></tr>`;
                    } else if (ddType === 'trend-revenue') {
                        const rev = parseFloat(String(getObjStr(r, 'Revenue', getObjStr(r, 'Total', getObjStr(r, 'Amount', '0')))).replace(/[^\d.-]/g, '')) || 0;
                        return `<tr class="hover:bg-slate-50 dark:bg-slate-700/30 transition-colors border-b border-slate-100 dark:border-slate-700/50"><td class="px-6 py-3 text-xs text-slate-500 whitespace-nowrap">${dt}</td><td class="px-6 py-3">${cInfo}</td><td class="px-6 py-3">${destZone}</td><td class="px-6 py-3 text-center text-sm font-semibold text-slate-700 dark:text-slate-300">${rep}</td><td class="px-6 py-3 text-center text-sm font-bold text-indigo-600">${pax}</td><td class="px-6 py-3 text-right text-sm font-bold text-emerald-600">$${rev.toLocaleString()}</td></tr>`;
                    } else {
                        return `<tr class="hover:bg-slate-50 dark:bg-slate-700/30 transition-colors border-b border-slate-100 dark:border-slate-700/50"><td class="px-6 py-3 text-xs text-slate-500 whitespace-nowrap">${dt}</td><td class="px-6 py-3">${cInfo}</td><td class="px-6 py-3">${destZone}</td><td class="px-6 py-3 text-center text-sm font-semibold text-slate-700 dark:text-slate-300">${rep}</td><td class="px-6 py-3 text-center text-sm font-bold text-indigo-600">${pax}</td><td class="px-6 py-3 text-xs text-slate-500 italic max-w-[200px] truncate" title="${note}">${note}</td></tr>`;
                    }
                }).join('');
            }
        }
        
        const ddTableInfo = document.getElementById('ddTableInfo');
        if (ddTableInfo) {
            ddTableInfo.innerText = `Showing ${total ? (ddPage-1)*ddPageSize+1 : 0} to ${Math.min(ddPage*ddPageSize, total)} of ${total}`;
        }
        
        const ddPrevBtn = document.getElementById('ddPrevBtn');
        const ddNextBtn = document.getElementById('ddNextBtn');
        if (ddPrevBtn) ddPrevBtn.disabled = ddPage === 1; 
        if (ddNextBtn) ddNextBtn.disabled = ddPage >= ddMaxPages;
    }

    window.exportDrilldownExcel = function() {
        const ddSearch = document.getElementById('ddSearch');
        const ddDestFilter = document.getElementById('ddDestFilter');
        const ddDynamicFilter = document.getElementById('ddDynamicFilter');

        const searchQuery = ddSearch ? ddSearch.value.toLowerCase().trim() : '';
        const destFilter = ddDestFilter ? ddDestFilter.value : 'all';
        const dynFilterVal = ddDynamicFilter ? ddDynamicFilter.value : 'all';

        const filtered = ddData.filter(r => {
            const cName = getObjStr(r, 'Customer Name', 'Unknown Client').toLowerCase();
            const rDest = getObjStr(r, 'Destination', '---').toLowerCase();
            if (searchQuery && !cName.includes(searchQuery)) return false;
            if (destFilter !== 'all' && rDest !== destFilter.toLowerCase()) return false;
            if (dynFilterVal !== 'all') {
                if (ddType === 'dest' || ddType === 'zone-perf') { 
                    if (getObjStr(r, 'Sale Rep', '---').toLowerCase() !== dynFilterVal.toLowerCase()) return false; 
                } 
                else if (ddType === 'rep' || ddType === 'rep-perf' || ddType === 'trend-bookings' || ddType === 'trend-revenue') { 
                    if (getObjStr(r, 'Zone', '---').toLowerCase() !== dynFilterVal.toLowerCase()) return false; 
                }
            } 
            return true;
        });

        let displayData = [];
        if (ddType === 'rep' || ddType === 'dest' || ddType === 'trend-bookings' || ddType === 'trend-revenue') {
            displayData = filtered;
        } else {
            displayData = filtered.filter(r => { 
                const st = String(r.Status || '').toUpperCase(); 
                return st.includes('6-CONFIRMED') || st.includes('BOOKED') || st.includes('CLOSED'); 
            });
        }

        if(displayData.length === 0) return alert("No data to export");
        
        let exportData = [];
        if (ddType === 'trend-revenue') {
            exportData = displayData.map((r, i) => ({ 
                'No.': i + 1, 
                'Sale Rep': getObjStr(r, 'Sale Rep', '---'), 
                'Customer Name': getObjStr(r, 'Customer Name', 'Unknown'), 
                'Contact Number': getObjStr(r, 'Contact Number', 'No Phone'), 
                'Destination': getObjStr(r, 'Destination', '---'), 
                'Zone': getObjStr(r, 'Zone', '---'), 
                'Pax': r.Pax || 0, 
                'Date Contact': fmtDate(r.DateStr || r['Contacted Date']), 
                'Revenue': parseFloat(String(getObjStr(r, 'Revenue', getObjStr(r, 'Total', getObjStr(r, 'Amount', '0')))).replace(/[^\d.-]/g, '')) || 0
            }));
        } else {
            exportData = displayData.map((r, i) => ({ 
                'No.': i + 1, 
                'Sale Rep': getObjStr(r, 'Sale Rep', '---'), 
                'Customer Name': getObjStr(r, 'Customer Name', 'Unknown'), 
                'Contact Number': getObjStr(r, 'Contact Number', 'No Phone'), 
                'Destination': getObjStr(r, 'Destination', '---'), 
                'Zone': getObjStr(r, 'Zone', '---'), 
                'Pax': r.Pax || 0, 
                'Date Contact': fmtDate(r.DateStr || r['Contacted Date']), 
                'Note': getObjStr(r, 'Noted', getObjStr(r, 'Remark', '')), 
                'Status': getObjStr(r, 'Status', '---') 
            }));
        }

        const ws = XLSX.utils.json_to_sheet(exportData); 
        const wb = XLSX.utils.book_new(); 
        XLSX.utils.book_append_sheet(wb, ws, "Filtered_Export");
        
        let filename = "Drilldown_Export.xlsx"; 
        const titleEl = document.getElementById('ddModalTitle');
        const titleText = titleEl ? titleEl.innerText : 'Export';
        
        if (titleText.includes('Workload')) filename = `Workload_${titleText.replace('Workload:', '').trim()}.xlsx`;
        if (titleText.includes('Demand')) filename = `Demand_${titleText.replace('Demand:', '').trim()}.xlsx`;
        if (titleText.includes('Agent Performance')) filename = `Agent_Confirmed_${titleText.replace('Agent Performance:', '').trim()}.xlsx`;
        if (titleText.includes('Zone Performance')) filename = `Zone_Confirmed_${titleText.replace('Zone Performance:', '').trim()}.xlsx`;
        if (titleText.includes('Confirmed Bookings')) filename = `Trend_Bookings_${titleText.replace('Confirmed Bookings:', '').trim()}.xlsx`;
        if (titleText.includes('Ledger Revenue')) filename = `Trend_Revenue_${titleText.replace('Ledger Revenue:', '').trim()}.xlsx`;
        
        XLSX.writeFile(wb, filename);
    };
    
    window.closeDrilldownModal = function() { 
        const modal = document.getElementById('drilldownModal'); 
        if (modal) {
            modal.classList.add('hidden'); 
            modal.classList.remove('flex'); 
            document.body.style.overflow = ''; 
        }
    };
</script>
