<!-- 4. Global Activity Tracker -->
<script>
    function logActivity(action, details) {
        if (isPreviewEnv()) return;
        fetch('/api/log_activity', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: action, details: details })
        }).catch(e => console.log(e));
    }

    document.addEventListener('click', function(e) {
        let btn = e.target.closest('button');
        if (btn) {
            let btnName = btn.innerText.trim() || btn.id || 'Icon Button';
            logActivity('CLICK', 'Clicked button: ' + btnName.substring(0, 30));
        }
    });
</script>
