<!-- Sync Loading Screen -->
<div id="loadingOverlay">
    <div class="bg-white dark:bg-slate-800 p-10 rounded-3xl shadow-2xl flex flex-col items-center min-w-[320px] transition-all scale-90 opacity-0 text-center border border-slate-100 dark:border-slate-700" id="loadingCard">
        <div class="spinner mb-6"></div>
        <div class="flex flex-col items-center">
            <p class="text-sm font-semibold text-slate-900 dark:text-white uppercase tracking-widest animate-pulse">Global Sync</p>
            <p class="text-xs font-medium text-slate-500 dark:text-slate-400 mt-2">Loading performance data...</p>
        </div>
    </div>
</div>

<!-- Top Navigation Bar -->
<div class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-[60] transition-colors duration-300">
    <div class="flex items-center gap-4">
        <button id="menuToggle" class="p-2.5 bg-slate-50 dark:bg-slate-800 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors border border-transparent dark:border-slate-700">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <div class="flex flex-col">
            <div class="flex items-center gap-3">
                <h2 class="text-lg font-bold text-slate-900 dark:text-white tracking-tight flex items-center gap-2">
                    <div class="w-6 h-6 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="activity" class="w-4 h-4 text-white"></i>
                    </div>
                    Sale Intelligence
                </h2>
                
                {% if current_user.is_authenticated and current_user.role == 'admin' %}
                <button id="headerUploadBtn" class="text-[10px] bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400 px-2.5 py-1 rounded-md font-semibold hover:bg-blue-100 dark:hover:bg-blue-500/20 transition-colors uppercase border border-blue-100 dark:border-blue-500/20 flex items-center gap-1">
                    <i data-lucide="upload-cloud" class="w-3 h-3"></i> Upload
                </button>
                <input type="file" id="fileInput" class="hidden" accept=".xlsx,.xls,.csv" />
                {% endif %}
            </div>
            <span class="text-[10px] font-medium text-slate-500 dark:text-slate-400 mt-1 flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                System Sync Active 
                <span id="headerSyncFileName" class="text-blue-500 dark:text-blue-400 italic"></span>
            </span>
        </div>
    </div>
    
    <div class="flex items-center gap-4">
        <button id="themeToggle" class="p-2.5 bg-slate-50 dark:bg-slate-800 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700">
            <i data-lucide="moon" id="themeToggleDarkIcon" class="hidden w-5 h-5"></i>
            <i data-lucide="sun" id="themeToggleLightIcon" class="hidden w-5 h-5"></i>
        </button>

        <div id="headerSheetContainer" class="hidden flex items-center gap-2 bg-white dark:bg-slate-800 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
            <select id="sheetSelect" class="text-xs font-medium border-none bg-transparent dark:text-white outline-none focus:ring-0 cursor-pointer pl-2"></select>
            <button id="loadBtn" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-semibold shadow-sm hover:bg-blue-700 transition-all">Sync</button>
        </div>
    </div>
</div>
